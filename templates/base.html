<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Jovan Naturals{% endblock %}</title>

        <!-- Tailwind config MUST come before the CDN script -->
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: "#1a5c3a",
                            "primary-light": "#e8f5ee",
                            "primary-mid": "#d4ecd9",
                            accent: "#FFD166",
                            surface: "#f5f7f6",
                            danger: "#c0392b",
                            "danger-light": "#fdecea",
                        },
                        fontFamily: {
                            serif: ['"Playfair Display"', "Georgia", "serif"],
                            sans: ['"DM Sans"', "system-ui", "sans-serif"],
                        },
                        maxWidth: {
                            mobile: "480px",
                        },
                    },
                },
            };
        </script>

        <!-- Tailwind CDN -->
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- Google Fonts -->
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500&display=swap"
            rel="stylesheet"
        />
    </head>

    <body>
        <!-- Header -->
        <header>
            <!-- Placeholder header -->
        </header>

        <!-- Main Content -->
        <main>{% block content %} {% endblock %}</main>

        <!-- Footer -->
        <footer>
            <!-- Placeholder footer -->
        </footer>
    </body>
</html>
